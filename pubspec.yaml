name: iraq_pharma_guide
description: Iraq Pharma Guide - دليل الدواء العراقي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Storage
  shared_preferences: ^2.3.1

  # UI
  flutter_svg: ^2.0.10+1

  # Phase 4
  url_launcher: ^6.3.0

  # Fonts
  google_fonts: ^6.2.1
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/database/

